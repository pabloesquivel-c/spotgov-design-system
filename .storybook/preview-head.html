<script>
  (function () {
    var reloadKey = 'sb-chunk-reload';

    function isChunkLoadError(message) {
      return /Failed to fetch dynamically imported module|Importing a module script failed|Loading chunk/i.test(
        message || '',
      );
    }

    function reloadOnce() {
      if (sessionStorage.getItem(reloadKey)) return;
      sessionStorage.setItem(reloadKey, '1');
      window.location.reload();
    }

    window.addEventListener('unhandledrejection', function (event) {
      var message = event.reason && event.reason.message;
      if (!isChunkLoadError(message)) return;
      event.preventDefault();
      reloadOnce();
    });

    window.addEventListener('error', function (event) {
      if (!isChunkLoadError(event.message)) return;
      event.preventDefault();
      reloadOnce();
    });

    window.addEventListener('load', function () {
      sessionStorage.removeItem(reloadKey);
    });
  })();
</script>
